name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Lint with flake8
        run: flake8 src/ --max-line-length=100 --ignore=E203,W503

      - name: Check formatting with black
        run: black --check src/

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  # ── Data Validation ────────────────────────────────────────────────────────
  data-validation:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate test data & validate
        run: |
          python src/data/generate_data.py --n-samples 1000 --output-dir data/raw
          echo "Data validation passed ✅"

  # ── Model Training Check ───────────────────────────────────────────────────
  model-smoke-test:
    runs-on: ubuntu-latest
    needs: data-validation

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test training pipeline (fast)
        run: |
          python src/data/generate_data.py --n-samples 2000
          python src/features/build_features.py
          python src/models/train.py --n-trials 5
          echo "Training pipeline smoke test passed ✅"

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: model-smoke-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t credit-risk-api:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run -d --name test-api -p 8000:8000 credit-risk-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
          echo "Docker health check passed ✅"

      - name: Tag and push (if secrets configured)
        if: ${{ secrets.DOCKER_HUB_TOKEN != '' }}
        run: |
          echo ${{ secrets.DOCKER_HUB_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
          docker tag credit-risk-api:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/credit-risk-api:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/credit-risk-api:latest
